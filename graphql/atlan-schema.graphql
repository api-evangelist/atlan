# Atlan GraphQL Schema (SDL)
# Derived from the atlan-python SDK (github.com/atlanhq/atlan-python) model layer,
# the Apache Atlas entity model that underpins Atlan's metadata graph, and Atlan's
# public API documentation.
# Endpoint: https://{tenant}.atlan.com/api/graphql

# ─── Scalars ────────────────────────────────────────────────────────────────

scalar Long
scalar JSON

# ─── Enums ──────────────────────────────────────────────────────────────────

enum EntityStatus {
  ACTIVE
  DELETED
}

enum CertificateStatus {
  VERIFIED
  DRAFT
  DEPRECATED
}

enum AnnouncementType {
  INFORMATION
  WARNING
  ISSUE
}

enum LineageDirection {
  UPSTREAM
  DOWNSTREAM
  BOTH
}

enum SortOrder {
  ASCENDING
  DESCENDING
}

enum AtlanTypeCategory {
  PRIMITIVE
  OBJECT_ID_TYPE
  ENUM
  STRUCT
  CLASSIFICATION
  ENTITY
  RELATIONSHIP
  BUSINESS_METADATA
}

# ─── Root Interface ──────────────────────────────────────────────────────────

"""
Base interface implemented by every entity in the Atlan knowledge graph.
Corresponds to the Atlas Referenceable supertype.
"""
interface Referenceable {
  guid: ID!
  typeName: String!
  qualifiedName: String!
  status: EntityStatus
  createdBy: String
  updatedBy: String
  createTime: Long
  updateTime: Long
  atlanTags: [AtlanTag]
  propagatedAtlanTags: [AtlanTag]
  assignedTerms: [GlossaryTerm]
}

# ─── Asset Interface ─────────────────────────────────────────────────────────

"""
Core asset interface; all data catalog entities implement this.
Extends Referenceable with human-facing metadata fields.
"""
interface Asset {
  guid: ID!
  typeName: String!
  qualifiedName: String!
  name: String
  displayName: String
  description: String
  userDescription: String
  tenantId: String
  certificateStatus: CertificateStatus
  certificateStatusMessage: String
  certificateUpdatedBy: String
  certificateUpdatedAt: Long
  announcementTitle: String
  announcementMessage: String
  announcementType: AnnouncementType
  ownerUsers: [String]
  ownerGroups: [String]
  adminUsers: [String]
  adminGroups: [String]
  viewerUsers: [String]
  viewerGroups: [String]
  connectorName: String
  connectionName: String
  connectionQualifiedName: String
  hasLineage: Boolean
  isDiscoverable: Boolean
  isEditable: Boolean
  subType: String
  status: EntityStatus
  createdBy: String
  updatedBy: String
  createTime: Long
  updateTime: Long
  atlanTags: [AtlanTag]
  propagatedAtlanTags: [AtlanTag]
  assignedTerms: [GlossaryTerm]
  links: [Link]
}

# ─── Classification / Tag ────────────────────────────────────────────────────

"""
An Atlan Tag (formerly classification) applied to an asset.
"""
type AtlanTag {
  typeName: String!
  entityGuid: ID
  entityStatus: EntityStatus
  propagate: Boolean
  removePropagationsOnEntityDelete: Boolean
  validityPeriods: JSON
}

"""
A tag definition (schema-level type) registered in the tenant.
"""
type Tag implements Asset {
  guid: ID!
  typeName: String!
  qualifiedName: String!
  name: String
  displayName: String
  description: String
  userDescription: String
  tagId: String
  tagAttributes: JSON
  tagAllowedValues: [String]
  mappedClassificationName: String
  tenantId: String
  certificateStatus: CertificateStatus
  certificateStatusMessage: String
  certificateUpdatedBy: String
  certificateUpdatedAt: Long
  announcementTitle: String
  announcementMessage: String
  announcementType: AnnouncementType
  ownerUsers: [String]
  ownerGroups: [String]
  adminUsers: [String]
  adminGroups: [String]
  viewerUsers: [String]
  viewerGroups: [String]
  connectorName: String
  connectionName: String
  connectionQualifiedName: String
  hasLineage: Boolean
  isDiscoverable: Boolean
  isEditable: Boolean
  subType: String
  status: EntityStatus
  createdBy: String
  updatedBy: String
  createTime: Long
  updateTime: Long
  atlanTags: [AtlanTag]
  propagatedAtlanTags: [AtlanTag]
  assignedTerms: [GlossaryTerm]
  links: [Link]
}

