# ─── Pagination & Search Inputs ──────────────────────────────────────────────

input AssetFilter {
  qualifiedName: String
  name: String
  typeName: String
  connectionQualifiedName: String
  status: EntityStatus
  certificateStatus: CertificateStatus
}

input SortInput {
  field: String!
  order: SortOrder
}

type PageInfo {
  total: Long!
  offset: Int!
  limit: Int!
}

type AssetConnection {
  pageInfo: PageInfo!
  assets: [Asset]
}

# ─── Query Root ──────────────────────────────────────────────────────────────

type Query {
  """Retrieve a single asset by its GUID."""
  asset(guid: ID!): Asset

  """
  Search assets using free-text and structured filters with pagination.
  Mirrors the DSL search exposed by the REST API.
  """
  assets(
    query: String
    filter: AssetFilter
    sort: [SortInput]
    offset: Int
    limit: Int
  ): AssetConnection

  """Retrieve a single Glossary by GUID."""
  glossary(guid: ID!): Glossary

  """List all Glossaries in the tenant."""
  glossaries(offset: Int, limit: Int): [Glossary]

  """Retrieve a single GlossaryTerm by GUID."""
  glossaryTerm(guid: ID!): GlossaryTerm

  """Retrieve a single Database by GUID."""
  database(guid: ID!): Database

  """Retrieve a single Schema by GUID."""
  schema(guid: ID!): Schema

  """Retrieve a single Table by GUID."""
  table(guid: ID!): Table

  """Retrieve a single Column by GUID."""
  column(guid: ID!): Column

  """Retrieve a single Connection by GUID."""
  connection(guid: ID!): Connection

  """List all Connections in the tenant."""
  connections(offset: Int, limit: Int): [Connection]

  """Retrieve lineage graph for an asset."""
  lineage(
    guid: ID!
    direction: LineageDirection
    depth: Int
    offset: Int
    limit: Int
  ): LineageGraph

  """Retrieve a Persona by GUID."""
  persona(guid: ID!): Persona

  """List all Personas in the tenant."""
  personas(offset: Int, limit: Int): [Persona]

  """Retrieve a Purpose by GUID."""
  purpose(guid: ID!): Purpose

  """List all Purposes in the tenant."""
  purposes(offset: Int, limit: Int): [Purpose]

  """List all users in the tenant."""
  users(offset: Int, limit: Int): [AtlanUser]

  """List all groups in the tenant."""
  groups(offset: Int, limit: Int): [AtlanGroup]
}

# ─── Mutation Root ───────────────────────────────────────────────────────────

input AssetInput {
  typeName: String!
  qualifiedName: String!
  name: String
  displayName: String
  description: String
  userDescription: String
  certificateStatus: CertificateStatus
  certificateStatusMessage: String
  announcementTitle: String
  announcementMessage: String
  announcementType: AnnouncementType
  ownerUsers: [String]
  ownerGroups: [String]
}

type MutationResponse {
  guid: ID
  qualifiedName: String
  typeName: String
  mutatedEntities: JSON
}

type Mutation {
  """Create or update an asset (upsert semantics via qualifiedName)."""
  upsertAsset(input: AssetInput!): MutationResponse

  """Remove an asset by GUID (soft-delete; sets status to DELETED)."""
  deleteAsset(guid: ID!): MutationResponse

  """Attach an Atlan Tag to an asset."""
  addAtlanTag(
    guid: ID!
    tagName: String!
    propagate: Boolean
  ): MutationResponse

  """Remove an Atlan Tag from an asset."""
  removeAtlanTag(guid: ID!, tagName: String!): MutationResponse

  """Link a GlossaryTerm to an asset."""
  assignTerm(assetGuid: ID!, termGuid: ID!): MutationResponse

  """Remove a GlossaryTerm link from an asset."""
  removeTerm(assetGuid: ID!, termGuid: ID!): MutationResponse
}
