- name: Atlan Webhooks API
  description: Real-time event webhooks that capture and deliver notifications when
    metadata changes occur within the Atlan platform, enabling downstream integrations,
    automation pipelines, and event-driven governance workflows.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
