  - type: GoSDK
    url: https://github.com/atlanhq/atlan-go
- name: Atlan GraphQL API
  description: GraphQL interface for querying Atlan's knowledge graph, enabling flexible
    traversal of metadata relationships including asset lineage, classifications,
    tags, business glossary links, and governance policies across the connected data
    estate.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.atlan.com/
  baseURL: https://{tenant}.atlan.com/api/graphql
  tags:
  - GraphQL
  - Assets
  - Lineage
  - Metadata
  properties:
