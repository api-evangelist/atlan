aid: atlan
name: Atlan
description: Atlan is a data catalog and metadata management platform — the Context
  Layer for AI — that unifies metadata from 80+ business systems into a single knowledge
  graph. It provides REST and GraphQL APIs for managing data assets, lineage, classifications,
  glossary terms, and data governance workflows. Customers execute 10,000+ API calls
  per week powering automated documentation, metadata enrichment, and custom integrations
  across the modern data stack.
