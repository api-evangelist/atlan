apis:
- name: Atlan REST API
  description: The core REST API for the Atlan platform, providing programmatic access
    to all platform capabilities including asset management, data lineage, glossary
    terms, classifications, custom metadata, personas, purposes, and governance workflows.
    Every metadata asset in Atlan — tables, columns, dashboards, pipelines — is accessible
    via versioned REST endpoints.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.atlan.com/
  baseURL: https://{tenant}.atlan.com/api
  tags:
  - Assets
  - Lineage
  - Glossary
  - Classifications
  - Governance
  - REST
  properties:
